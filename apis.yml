name: Amazon Timestream
description: Amazon Timestream is a fast, scalable, and serverless time series database service designed for IoT and operational applications. It makes it easy to store and analyze trillions of events
  per day at a fraction of the cost of relational databases, with built-in time series analytics functions and automatic data lifecycle management.
