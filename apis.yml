apis:
- name: Amazon Timestream API
  description: >-
    The Amazon Timestream API provides programmatic access to manage serverless
    time series databases. It enables developers to create and manage databases
    and tables, write time series data records, execute queries with built-in
    time series analytics functions, and configure data retention policies for
    automatic lifecycle management.
