naftiko: 1.0.0-alpha2
info:
  label: Amazon Timestream — Write
  description: 'Amazon Timestream — Write. 1 operations. Lead operation: Amazon Timestream Write Records. Self-contained Naftiko
    capability covering one Amazon Timestream business surface.'
  tags:
  - Amazon Timestream
  - Write
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_TIMESTREAM_API_KEY: AMAZON_TIMESTREAM_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-timestream-write
    baseUri: https://ingest.timestream.amazonaws.com
    description: Amazon Timestream — Write business capability. Self-contained, no shared references.
    resources:
    - name: '#WriteRecords'
      path: /#WriteRecords
      operations:
      - name: writerecords
        method: POST
        description: Amazon Timestream Write Records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: amazon-timestream-write-rest
    port: 8080
    description: REST adapter for Amazon Timestream — Write. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/writerecords
      name: writerecords
      description: 'REST surface for #WriteRecords.'
      operations:
      - method: POST
        name: writerecords
        description: Amazon Timestream Write Records
        call: amazon-timestream-write.writerecords
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-timestream-write-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Timestream — Write. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-timestream-write-records
      description: Amazon Timestream Write Records
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-timestream-write.writerecords
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
